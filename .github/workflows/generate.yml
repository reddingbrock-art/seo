name: Generate SEO Pages

permissions:
  contents: write

on:
  push:
    paths:
      - 'targets.csv'

  workflow_dispatch:
    inputs:
      slug:
        description: 'Regenerate a single slug (leave blank for full run)'
        required: false
        default: ''

      sample_count:
        description: 'Generate a sample number of pages (leave blank for full run)'
        required: false
        default: ''

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Generate pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            node batch.js --slug "${{ github.event.inputs.slug }}"
          elif [ -n "${{ github.event.inputs.sample_count }}" ]; then
            node batch.js --limit "${{ github.event.inputs.sample_count }}" --skip-existing
          else
            node batch.js --skip-existing
          fi

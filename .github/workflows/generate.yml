name: Generate SEO Pages

on:
  push:
    paths:
      - "targets.csv"
  workflow_dispatch:
    inputs:
      slug:
        description: "Single slug to regenerate (leave blank for all)"
        required: false
        default: ""
      limit:
        description: "Max pages to generate (leave blank for all)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            node batch.js --slug "${{ github.event.inputs.slug }}"
          elif [ -n "${{ github.event.inputs.limit }}" ]; then
            node batch.js --limit "${{ github.event.inputs.limit }}" --skip-existing
          else
            node batch.js --skip-existing
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: generate SEO pages [skip ci]"
          git push

name: Generate SEO Pages

on:
  push:
    paths:
      - "targets.csv"        # runs when you update the CSV
  workflow_dispatch:         # lets you trigger manually from GitHub UI
    inputs:
      limit:
        description: "Max pages to generate (leave blank for all)"
        required: false
        default: ""
      slug:
        description: "Regenerate one specific slug (leave blank to skip)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit HTML files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Generate pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            node batch.js --slug "${{ github.event.inputs.slug }}"
          elif [ -n "${{ github.event.inputs.limit }}" ]; then
            node batch.js --limit "${{ github.event.inputs.limit }}"
          else
            node batch.js
          fi

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Generate SEO pages [skip ci]"
          git push
